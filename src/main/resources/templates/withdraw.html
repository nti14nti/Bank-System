<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Withdraw</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-sm p-4">

        <h2 class="mb-4">💸 Withdraw Money</h2>

        <form action="/accounts/withdraw" method="post">

            <div class="mb-3">
                <label>Account ID</label>

                <input type="text"
                       name="accountId"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label>Amount</label>

                <input type="number"
                       step="0.01"
                       name="amount"
                       class="form-control"
                       required>
            </div>

            <button class="btn btn-warning">
                Withdraw
            </button>

        </form>

    </div>

</div>

</body>
</html>

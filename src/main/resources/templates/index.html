<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Bank System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="text-center mb-5">
        <h1 class="fw-bold">🏦 Bank Management System</h1>
        <p class="text-muted">Simple Banking Application using Spring Boot & MongoDB</p>
    </div>

    <div class="row g-4">

        <div class="col-md-3">
            <div class="card shadow-sm p-3 text-center">
                <h4>Create Account</h4>
                <a href="/accounts-page" class="btn btn-primary mt-3">
                    Open
                </a>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm p-3 text-center">
                <h4>Deposit</h4>
                <a href="/deposit-page" class="btn btn-success mt-3">
                    Open
                </a>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm p-3 text-center">
                <h4>Withdraw</h4>
                <a href="/withdraw-page" class="btn btn-warning mt-3">
                    Open
                </a>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm p-3 text-center">
                <h4>Transfer</h4>
                <a href="/transfer-page" class="btn btn-dark mt-3">
                    Open
                </a>
            </div>
        </div>

    </div>

</div>

</body>
</html>
